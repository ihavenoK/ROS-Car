#TebLocalPlanner官方介绍：http://wiki.ros.org/teb_local_planner

#局部路径规划器TebLocalPlannerROS命名空间
TebLocalPlannerROS:
  odom_topic: odom
  map_frame: map

  # ===== 机器人速度/加速度 =====
  max_vel_x: 0.4           # 最大前向速度 (m/s)
  max_vel_y: 0.0           # 非全向，必须为0
  max_vel_x_backwards: 0.0 # 禁止倒车（差速小车前向优先）
  max_vel_theta: 0.8       # 最大转向角速度 (rad/s)
  acc_lim_x: 0.5           # 线加速度 (m/s^2)
  acc_lim_y: 0.0           # 非全向
  acc_lim_theta: 0.8       # 角加速度 (rad/s^2)

  # 差速驱动：min_turning_radius=0 可原地旋转
  min_turning_radius: 0.0
  wheelbase: 0.33              # 两驱动轮间距 (0.165×2)
  cmd_angle_instead_rotvel: False

  #机器人外形
  footprint_model:
    type: polygon
    vertices: [[0.35,-0.18],[-0.10,-0.18],[-0.10,0.18],[0.35,0.18]]

  #障碍物参数
  min_obstacle_dist: 0.15
  include_costmap_obstacles: True
  costmap_obstacles_behind_robot_dist: 1.5
  obstacle_poses_affected: 15
  costmap_converter_plugin: ""
  costmap_converter_spin_thread: True
  costmap_converter_rate: 5
  include_dynamic_obstacles: True
  dynamic_obstacle_inflation_dist: 0.6

  #目标点误差
  xy_goal_tolerance: 0.3
  yaw_goal_tolerance: 0.2
  free_goal_vel: False

  #轨迹配置
  teb_autosize: True
  dt_ref: 0.3
  dt_hysteresis: 0.03
  global_plan_overwrite_orientation: True    # 不强制跟随全局朝向
  allow_init_with_backwards_motion: False    # 禁止倒车初始化
  max_global_plan_lookahead_dist: 3.0
  feasibility_check_no_poses: 3

  #轨迹优化 ——— 关键：前向权重拉满，防掉头/倒车
  no_inner_iterations: 4
  no_outer_iterations: 3
  optimization_activate: True
  optimization_verbose: False
  penalty_epsilon: 0.1
  obstacle_cost_exponent: 4
  weight_max_vel_x: 2
  weight_max_vel_theta: 1
  weight_acc_lim_x: 1
  weight_acc_lim_theta: 1
  weight_kinematics_nh: 1000
  weight_kinematics_forward_drive: 5000     # ★ 强制前向
  weight_kinematics_turning_radius: 1
  weight_optimaltime: 50                    # ★ 路径更直接
  weight_shortest_path: 5
  weight_obstacle: 100
  weight_inflation: 0.2
  weight_dynamic_obstacle: 10
  weight_dynamic_obstacle_inflation: 0.2
  weight_viapoint: 1
  weight_adapt_factor: 2

  #拓扑规划
  enable_homotopy_class_planning: False
  enable_multithreading: True
  max_number_classes: 2
  selection_cost_hysteresis: 1.0
  selection_prefer_initial_plan: 0.95
  selection_obst_cost_scale: 1.0
  selection_alternative_time_cost: False
  roadmap_graph_no_samples: 15
  roadmap_graph_area_width: 5
  roadmap_graph_area_length_scale: 1.0
  h_signature_prescaler: 0.5
  h_signature_threshold: 0.1
  obstacle_heading_threshold: 0.45
  switching_blocking_period: 0.0
  viapoints_all_candidates: True
  delete_detours_backwards: True
  max_ratio_detours_duration_best_duration: 3.0
  visualize_hc_graph: False
  visualize_with_time_as_z_axis_scale: False

  #恢复行为
  shrink_horizon_backup: True
  shrink_horizon_min_duration: 10
  oscillation_recovery: True               # ★ 检测原地打转
  oscillation_v_eps: 0.1
  oscillation_omega_eps: 0.1
  oscillation_recovery_min_duration: 10
  oscillation_filter_duration: 10
